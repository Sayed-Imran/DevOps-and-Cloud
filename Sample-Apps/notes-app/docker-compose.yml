services:
  postgres:
    image: postgres:16
    container_name: notes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notesdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - notes-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notesdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: notes-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/notesdb
      # Change SECRET_KEY to a long random string before deploying anywhere
      SECRET_KEY: "replace-this-with-a-long-random-secret"
    # Backend is only reachable internally via Nginx; not exposed to the host
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - notes-net

  frontend:
    build: ./frontend
    container_name: notes-frontend
    x-google-cloudrun:
      ingress-container: true
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - notes-net

volumes:
  postgres_data:

networks:
  notes-net:
    driver: bridge
